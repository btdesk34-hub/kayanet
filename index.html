<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAYA Net Pro | Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #0071e3;
            --text: #ffffff;
            --text-dim: #86868b;
            --online: #28cd41;
            --offline: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .brand-box { line-height: 1; }
        .brand-box h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
        .brand-box span { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: var(--text-dim); }

        .stats {
            background: var(--accent);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
        }

        .search-container { margin-bottom: 25px; padding: 0 10px; }
        #search {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        #search:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); }

        /* KARE IZGARA YAPISI */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .card {
            aspect-ratio: 1 / 1; /* TAM KARE */
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: inherit;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            padding: 10px;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        /* DURUM NOKTASI - KÖŞEDE */
        .status-dot {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }
        .online { background: var(--online); box-shadow: 0 0 10px var(--online); }
        .offline { background: var(--offline); box-shadow: 0 0 10px var(--offline); }
        .checking { background: #ff9500; animation: pulse 1s infinite; }

        @keyframes pulse { 50% { opacity: 0.3; } }

        .ip-main {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
            color: var(--text);
        }

        .shop-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card.visited { opacity: 0.4; filter: grayscale(1); }

        .controls { display: flex; gap: 10px; align-items: center; }
        .btn-reset { 
            background: none; border: 1px solid var(--border); 
            color: var(--text-dim); padding: 8px; border-radius: 8px; cursor: pointer;
        }

        /* Mobil Ayarı */
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
            .ip-main { font-size: 20px; }
        }
    </style>
</head>
<body>

        <h1>KAYA PRO</h1>
        <span>Network Dashboard</span>
    </div>
    <div class="controls">
        <button class="btn-reset" onclick="tiklamalariSifirla()">↺</button>
        <div id="total-count" class="stats">...</div>
    </div>
</header>

<div class="search-container">

</div>

        {ip: "192.168.119.1", isim: "Yarımca"}
    ];

    let tiklananlar = JSON.parse(localStorage.getItem('kaya_modern_clicks')) || [];

    function render() {
        document.getElementById('total-count').innerText = veriler.length + " MAĞAZA";
        const grid = document.getElementById('liste');
        grid.innerHTML = "";
        
        veriler.sort((a, b) => a.isim.localeCompare(b.isim, 'tr')).forEach((m, i) => {
            const visited = tiklananlar.includes(m.isim) ? 'visited' : '';
            // IP'nin son kısmını büyük göster
            const ipParts = m.ip.split('.');
            const shortIp = ipParts[2] + "." + ipParts[3];

            grid.innerHTML += `
                <a href="http://${m.ip}" target="_blank" class="card ${visited}" onclick="saveClick(event, '${m.isim}')" data-ip="${m.ip}" data-id="dot-${i}">
                    <div class="status-dot" id="dot-${i}"></div>
                    <div class="ip-main">${shortIp}</div>
                    <div class="shop-name">${m.isim}</div>
                </a>`;
        });
    }

    function saveClick(e, isim) {
        if(!tiklananlar.includes(isim)) {
            tiklananlar.push(isim);
            localStorage.setItem('kaya_modern_clicks', JSON.stringify(tiklananlar));
            e.currentTarget.classList.add('visited');
        }
    }

    function tiklamalariSifirla() {
        if(confirm("Sıfırlansın mı?")) {
            localStorage.removeItem('kaya_modern_clicks');
            tiklananlar = [];
            render();
        }
    }

    function ping(ip, id) {
        return new Promise(resolve => {
            const el = document.getElementById(id);
            if(!el) return resolve();
            el.className = "status-dot checking";
            const img = new Image();
            const t = setTimeout(() => { el.className = "status-dot offline"; resolve(); }, 2500);
            img.onload = img.onerror = () => { clearTimeout(t); el.className = "status-dot online"; resolve(); };
            img.src = `http://${ip}/favicon.ico?v=${Date.now()}`;
        });
    }

    async function autoScan() {
        const cards = document.querySelectorAll('.card');
        for(let i=0; i<cards.length; i+=30) {
            const group = Array.from(cards).slice(i, i+30);
            await Promise.all(group.map(c => ping(c.dataset.ip, c.dataset.id)));
        }
    }

    function ara() {
        const val = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.textContent.toLowerCase().includes(val) ? "flex" : "none";
        });
    }

    render();
    autoScan();
    setInterval(autoScan, 45000);
</script>
